<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-container">
        <svg class="aperti-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="100" rx="15" fill="#2a5788" />
          <path d="M50 20 L85 75 L50 63 L15 75 Z" fill="white" />
        </svg>
      </div>
      <h2>APER<span class="highlight">TI</span></h2>
      <p>Soluções em Tecnologia</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <div class="form-group" [class.has-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <label for="email">E-mail</label>
        <div class="input-wrapper">
          <input type="email" id="email" formControlName="email" placeholder="admin@autochina.com" autocomplete="email">
        </div>
        <span class="error-msg" *ngIf="loginForm.get('email')?.hasError('required') && loginForm.get('email')?.touched">
          E-mail é obrigatório.
        </span>
        <span class="error-msg" *ngIf="loginForm.get('email')?.hasError('email') && loginForm.get('email')?.touched">
          Formato de e-mail inválido.
        </span>
      </div>

      <div class="form-group"
        [class.has-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <input type="password" id="password" formControlName="password" placeholder="••••••••"
            autocomplete="current-password">
        </div>
        <span class="error-msg" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          A senha deve ter pelo menos 6 caracteres.
        </span>
      </div>

      <div class="error-alert" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Entrar</span>
        <span class="spinner" *ngIf="isLoading"></span>
      </button>

    </form>
  </div>

  <div class="login-background"></div>
</div>
