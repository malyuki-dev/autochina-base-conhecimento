<!-- Mobile Backdrop -->
<div *ngIf="isOpen" class="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm transition-opacity"
    (click)="handleMobileClose()"></div>

<aside [ngClass]="[
    'fixed md:relative z-50 h-full border-r border-white-10 glass flex flex-col hide-scrollbar transition-all duration-300 ease-in-out',
    isOpen ? 'translate-x-0 w-80' : '-translate-x-full md:translate-x-0 md:w-[88px] w-80'
]">
    <div
        [ngClass]="['p-6 border-b border-white-10 flex items-center justify-between transition-all duration-300', !isOpen ? 'md:p-4 md:justify-center' : '']">
        <div
            [ngClass]="['flex items-center gap-2 overflow-hidden transition-all duration-300', !isOpen ? 'md:w-0 md:opacity-0' : 'w-full opacity-100']">
            <h1 class="text-2xl font-bold text-gradient flex items-center gap-2 whitespace-nowrap">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-library text-primary shrink-0">
                    <path d="m16 6 4 14" />
                    <path d="M12 6v14" />
                    <path d="M8 8v12" />
                    <path d="M4 4v16" />
                </svg>
                DealerNet
            </h1>
        </div>

        <div *ngIf="!isOpen" class="hidden md:flex justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-library text-primary">
                <path d="m16 6 4 14" />
                <path d="M12 6v14" />
                <path d="M8 8v12" />
                <path d="M4 4v16" />
            </svg>
        </div>

        <button *ngIf="isOpen" (click)="onClickClose()"
            class="md:hidden p-2 text-gray-400 hover:text-white rounded-lg hover:bg-white-5 transition-colors absolute right-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-x">
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
            </svg>
        </button>
    </div>

    <div class="flex-1 overflow-y-auto overflow-x-hidden p-4 space-y-6 custom-scrollbar pb-24 md:pb-4">
        <div>
            <a routerLink="/treinamentos" (click)="handleMobileClose()" [title]="!isOpen ? 'Início' : ''" [ngClass]="[
                    'flex items-center gap-3 py-3 rounded-xl transition-all',
                    isActive('/treinamentos') || isActive('/') ? 'bg-primary-20 text-primary font-medium' : 'hover:bg-white-5 text-gray-300',
                    !isOpen ? 'md:justify-center px-0 md:px-0 px-4' : 'px-4'
                ]">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-home shrink-0">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                <span
                    [ngClass]="['whitespace-nowrap transition-all duration-300', !isOpen ? 'md:opacity-0 md:w-0 overflow-hidden' : 'opacity-100 w-auto']">Início</span>
            </a>

            <!-- Nova Aba Gemini -->
            <a routerLink="/video-chat" (click)="handleMobileClose()" [title]="!isOpen ? 'Analista Gemini IA' : ''"
                [ngClass]="[
                    'flex items-center gap-3 py-3 mt-2 rounded-xl transition-all',
                    isActive('/video-chat') ? 'bg-secondary-20 text-secondary font-medium' : 'hover:bg-white-5 text-gray-300',
                    !isOpen ? 'md:justify-center px-0 md:px-0 px-4' : 'px-4'
                ]">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-sparkles shrink-0">
                    <path
                        d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                </svg>
                <span
                    [ngClass]="['whitespace-nowrap transition-all duration-300', !isOpen ? 'md:opacity-0 md:w-0 overflow-hidden' : 'opacity-100 w-auto text-secondary font-bold']">Analista
                    Gemini IA</span>
            </a>
        </div>

        <div *ngFor="let category of categories" class="space-y-2">
            <h3
                [ngClass]="['text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 transition-opacity duration-300', !isOpen ? 'md:opacity-0 md:h-0 overflow-hidden px-0' : 'opacity-100 px-4']">
                {{ category }}
            </h3>

            <!-- Tiny divider for collapsed mode -->
            <div *ngIf="!isOpen" class="hidden md:block w-8 h-px bg-white-10 mx-auto my-4"></div>

            <div class="space-y-1">
                <a *ngFor="let video of getVideosByCategory(category)" [routerLink]="['/video', video.id]"
                    [title]="!isOpen ? video.title : ''" (click)="handleMobileClose()" [ngClass]="[
                        'flex items-start gap-3 py-2.5 rounded-xl transition-all group',
                        isActive('/video/' + video.id) ? 'bg-primary-20 text-white' : 'hover:bg-white-5 text-gray-400 hover:text-gray-200',
                        !isOpen ? 'md:justify-center md:px-0 px-4' : 'px-4'
                    ]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        [ngClass]="['lucide lucide-play-circle shrink-0 transition-all duration-300', isActive('/video/' + video.id) ? 'text-primary' : 'text-gray-500 group-hover:text-primary', isOpen ? 'mt-0.5' : '']">
                        <circle cx="12" cy="12" r="10" />
                        <polygon points="10 8 16 12 10 16 10 8" />
                    </svg>
                    <span
                        [ngClass]="['text-sm line-clamp-2 leading-snug transition-all duration-300', !isOpen ? 'md:opacity-0 md:w-0 overflow-hidden' : 'opacity-100 w-auto']">
                        {{ video.title }}
                    </span>
                </a>
            </div>
        </div>
    </div>
</aside>
